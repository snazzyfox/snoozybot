name: build-deploy

permissions:
  contents: read
  pull-requests: read

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: 1.25
    - run: go get .
    - run: go build -o build/snoozybot .
    - uses: actions/upload-artifact@v7
      with:
        name: snoozybot
        path: build/snoozybot

  deploy:
    runs-on: ubuntu-latest
    environment: snoozybot
    needs: [build]
    if: github.repository_id == '390957198' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: snoozybot
      - uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          source: "snoozybot"
          target: ${{ vars.DEPLOY_TARGET }}
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          script: |
            chmod +x "${{ vars.DEPLOY_TARGET }}/snoozybot"
            sudo systemctl restart snoozybot.service
